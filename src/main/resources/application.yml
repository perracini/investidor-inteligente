spring:
  application:
    name: investidor-inteligente
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: llama3.2
        options:
          temperature: 0.4
          num-predict: 1024
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=200,expireAfterWrite=900s

server:
  port: 8084

brapi:
  base-url: https://brapi.dev/api

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: investidor-inteligente

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
